steps:
  # Step 1: Authenticate with Google Cloud
  - name: "gcr.io/cloud-builders/gcloud"
    args: ["auth", "configure-docker"]

  # Step 2: Fetch credentials from Secret Manager
  - name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud secrets versions access latest --secret=<credentials> > /workspace/credentials.json
  # Backend build
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "my-grocery-app", "."]
  # Tag the image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "tag",
        "my-grocery-app:latest",
        "gcr.io/my-grocery-home/my-grocery-app:latest",
      ]

  # Configure docker authentication
  - name: "gcr.io/cloud-builders/gcloud"
    args: ["auth", "configure-docker"]

  # Push the image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/my-grocery-home/my-grocery-app:latest"]

  # Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "my-grocery-app" # Updated service name
      - "--image"
      - "gcr.io/my-grocery-home/my-grocery-app:latest"
      - "--platform"
      - "managed"
      - "--region"
      - "us-central1"
      - "--allow-unauthenticated"
      - "--update-env-vars=GOOGLE_APPLICATION_CREDENTIALS=/workspace/credentials.json"

    timeout: "1600s"

images:
  - "gcr.io/my-grocery-home/my-grocery-app:latest"

timeout: "3600s"
