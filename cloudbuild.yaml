steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/my-grocery-app:$SHORT_SHA", "."]

  # Push the image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/my-grocery-app:$SHORT_SHA"]

  # Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "my-grocery-app"
      - "--image"
      - "gcr.io/$PROJECT_ID/my-grocery-app:$SHORT_SHA"
      - "--platform"
      - "managed"
      - "--region"
      - "us-central1"
      - "--allow-unauthenticated"
      - "--set-env-vars"
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID,BUCKET_NAME=${_BUCKET_NAME},FRONTEND_APP_URL=${_FRONTEND_APP_URL},CORS_ORIGINS=${_CORS_ORIGINS}"
    timeout: "1600s"

images:
  - "gcr.io/$PROJECT_ID/my-grocery-app:$SHORT_SHA"

substitutions:
  _BUCKET_NAME: my-grocery
  _FRONTEND_APP_URL: https://my-grocery-home.uc.r.appspot.com
  _CORS_ORIGINS: https://my-grocery-home.uc.r.appspot.com

timeout: "3600s"
